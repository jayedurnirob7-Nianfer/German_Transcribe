<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube German Learning Transcriber</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            padding: 20px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .video-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .transcription-panel {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .transcription-panel h3 {
            margin-bottom: 15px;
            color: #2a5298;
        }

        .caption-line {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        .caption-line.active {
            background: #e8eaf6;
            border-left-color: #ff6b6b;
            transform: translateX(5px);
        }

        .caption-german {
            font-size: 1.1em;
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .caption-english {
            font-size: 0.95em;
            color: #666;
            font-style: italic;
        }

        .timestamp {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 5px;
        }

        .word {
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 3px;
            transition: background 0.2s;
        }

        .word:hover {
            background: #fff3cd;
        }

        .word.saved {
            background: #d4edda;
        }

        .sidebar {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
        }

        .sidebar h3 {
            color: #2a5298;
            margin-bottom: 15px;
        }

        .vocab-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .vocab-item {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
        }

        .vocab-word {
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 4px;
        }

        .vocab-translation {
            font-size: 0.9em;
            color: #666;
        }

        .vocab-clear {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .vocab-clear:hover {
            background: #c82333;
        }

        .save-subtitles-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .save-subtitles-btn:hover {
            background: #218838;
        }

        .saved-subtitles-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .saved-subtitle-item {
            background: white;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #28a745;
        }

        .saved-subtitle-meta {
            font-size: 0.8em;
            color: #777;
            margin-top: 4px;
            word-break: break-all;
        }

        .saved-subtitle-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .saved-subtitle-actions button {
            flex: 1;
            padding: 6px;
            border: 1px solid #667eea;
            border-radius: 4px;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-size: 0.8em;
        }

        .saved-subtitle-actions button.delete {
            border-color: #dc3545;
            color: #dc3545;
        }

        .status {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .control-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: #667eea;
            color: white;
        }

        .control-btn.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🇩🇪 YouTube German Learning Transcriber</h1>
            <p>Learn German by watching YouTube videos with real-time transcriptions and translations</p>
        </div>

        <div class="main-content">
            <div class="video-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="videoUrl" 
                        placeholder="Paste YouTube URL here (e.g., https://www.youtube.com/watch?v=...)"
                    />
                    <button class="btn" id="loadBtn">Load Video</button>
                </div>

                <div id="statusMsg"></div>

                <div class="video-container" id="videoContainer" style="display: none;">
                    <iframe id="videoFrame" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>

                <div class="controls" id="controls" style="display: none;">
                    <button class="control-btn" id="autoScrollBtn">Auto-scroll: ON</button>
                    <button class="control-btn" id="showTranslationBtn">Translations: ON</button>
                </div>

                <div class="transcription-panel" id="transcriptionPanel" style="display: none;">
                    <h3>📝 Live Transcription</h3>
                    <div id="captions"></div>
                </div>
            </div>

            <div class="sidebar">
                <h3>📚 My Vocabulary</h3>
                <div class="vocab-list" id="vocabList">
                    <p style="color: #999; text-align: center;">Click on German words in the transcription to save them here!</p>
                </div>
                <button class="vocab-clear" id="clearVocab" style="display: none;">Clear All</button>
                <button class="save-subtitles-btn" id="saveSubtitlesBtn" style="display: none;">Save Current Subtitles</button>

                <div class="saved-subtitles-section">
                    <h3>💾 Saved Subtitles</h3>
                    <div class="vocab-list" id="savedSubtitlesList">
                        <p style="color: #999; text-align: center;">Saved subtitles will appear here.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let captions = [];
        let savedVocab = JSON.parse(localStorage.getItem('germanVocab') || '[]');
        let savedSubtitles = JSON.parse(localStorage.getItem('savedSubtitles') || '[]');
        let currentVideoId = null;
        let currentVideoUrl = null;
        let autoScroll = true;
        let showTranslations = true;
        let updateInterval = null;

        const elements = {
            videoUrl: document.getElementById('videoUrl'),
            loadBtn: document.getElementById('loadBtn'),
            statusMsg: document.getElementById('statusMsg'),
            videoContainer: document.getElementById('videoContainer'),
            videoFrame: document.getElementById('videoFrame'),
            transcriptionPanel: document.getElementById('transcriptionPanel'),
            captions: document.getElementById('captions'),
            vocabList: document.getElementById('vocabList'),
            clearVocab: document.getElementById('clearVocab'),
            saveSubtitlesBtn: document.getElementById('saveSubtitlesBtn'),
            savedSubtitlesList: document.getElementById('savedSubtitlesList'),
            controls: document.getElementById('controls'),
            autoScrollBtn: document.getElementById('autoScrollBtn'),
            showTranslationBtn: document.getElementById('showTranslationBtn')
        };

        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/,
                /youtube\.com\/embed\/([^&\n?#]+)/
            ];
            
            for (let pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function showStatus(message, type = 'info') {
            elements.statusMsg.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function renderNoCaptionsState(message) {
            elements.captions.innerHTML = `
                <div class="loading">
                    <strong>Captions unavailable for this video.</strong><br/>
                    ${message}
                </div>
            `;
        }

        function getSavedSubtitleByVideo(videoId) {
            return savedSubtitles.find(item => item.videoId === videoId);
        }

        function renderSavedSubtitles() {
            if (savedSubtitles.length === 0) {
                elements.savedSubtitlesList.innerHTML = '<p style="color: #999; text-align: center;">Saved subtitles will appear here.</p>';
                return;
            }

            const html = savedSubtitles.slice().reverse().map(item => `
                <div class="saved-subtitle-item">
                    <div class="vocab-word">${item.label || `Video ${item.videoId}`}</div>
                    <div class="saved-subtitle-meta">${item.captions.length} lines • ${new Date(item.savedAt).toLocaleString()}</div>
                    <div class="saved-subtitle-meta">${item.url}</div>
                    <div class="saved-subtitle-actions">
                        <button data-action="load" data-videoid="${item.videoId}">Load</button>
                        <button class="delete" data-action="delete" data-videoid="${item.videoId}">Delete</button>
                    </div>
                </div>
            `).join('');

            elements.savedSubtitlesList.innerHTML = html;

            elements.savedSubtitlesList.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const action = e.target.dataset.action;
                    const videoId = e.target.dataset.videoid;

                    if (action === 'load') {
                        loadSavedSubtitle(videoId);
                    } else if (action === 'delete') {
                        deleteSavedSubtitle(videoId);
                    }
                });
            });
        }

        function saveCurrentSubtitles() {
            if (!currentVideoId || !currentVideoUrl || captions.length === 0) {
                showStatus('Load a video with subtitles before saving.', 'info');
                return;
            }

            const label = prompt('Optional label for this subtitle set (e.g., B1 Listening Test):', '') || '';

            const entry = {
                videoId: currentVideoId,
                url: currentVideoUrl,
                label: label.trim(),
                captions,
                savedAt: Date.now()
            };

            savedSubtitles = savedSubtitles.filter(item => item.videoId !== currentVideoId);
            savedSubtitles.push(entry);
            localStorage.setItem('savedSubtitles', JSON.stringify(savedSubtitles));
            renderSavedSubtitles();
            showStatus('✅ Subtitles saved for this video.', 'success');
        }

        function deleteSavedSubtitle(videoId) {
            savedSubtitles = savedSubtitles.filter(item => item.videoId !== videoId);
            localStorage.setItem('savedSubtitles', JSON.stringify(savedSubtitles));
            renderSavedSubtitles();
            showStatus('Saved subtitle entry deleted.', 'info');
        }

        function loadSavedSubtitle(videoId) {
            const saved = getSavedSubtitleByVideo(videoId);
            if (!saved) {
                showStatus('Saved subtitle entry not found.', 'error');
                return;
            }

            currentVideoId = saved.videoId;
            currentVideoUrl = saved.url;
            captions = saved.captions;

            elements.videoUrl.value = saved.url;
            elements.videoFrame.src = `https://www.youtube.com/embed/${saved.videoId}?enablejsapi=1`;
            elements.videoContainer.style.display = 'block';
            elements.controls.style.display = 'flex';
            elements.transcriptionPanel.style.display = 'block';
            elements.saveSubtitlesBtn.style.display = captions.length > 0 ? 'block' : 'none';

            renderCaptions();
            showStatus('✅ Loaded saved subtitles from local storage.', 'success');
        }

        async function fetchCaptions(videoId) {
            showStatus('Fetching German captions...', 'info');
            
            try {
                // Using YouTube's transcript API endpoint
                const response = await fetch(`https://www.youtube.com/watch?v=${videoId}`);
                const html = await response.text();
                
                // Extract caption tracks from page
                const captionMatch = html.match(/"captions":({.*?}]}})/);
                if (!captionMatch) {
                    showStatus('This video has no subtitle track. You can still watch it, but transcript/translation will be unavailable.', 'info');
                    return [];
                }

                const captionsData = JSON.parse(captionMatch[1]);
                const tracks = captionsData.playerCaptionsTracklistRenderer?.captionTracks || [];
                
                // Find German captions
                const germanTrack = tracks.find(t => t.languageCode.startsWith('de')) || tracks[0];
                
                if (!germanTrack) {
                    showStatus('No subtitle tracks found for this video. Transcript/translation is unavailable.', 'info');
                    return [];
                }

                // Fetch caption content
                const captionResponse = await fetch(germanTrack.baseUrl);
                const captionXml = await captionResponse.text();
                
                // Parse XML captions
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(captionXml, 'text/xml');
                const textElements = xmlDoc.getElementsByTagName('text');
                
                const parsedCaptions = Array.from(textElements).map(el => {
                    const start = parseFloat(el.getAttribute('start'));
                    const duration = parseFloat(el.getAttribute('dur') || '0');
                    const text = el.textContent.replace(/&amp;/g, '&')
                                               .replace(/&lt;/g, '<')
                                               .replace(/&gt;/g, '>')
                                               .replace(/&#39;/g, "'")
                                               .replace(/&quot;/g, '"');
                    
                    return {
                        start,
                        end: start + duration,
                        text,
                        german: text,
                        english: null // Will be translated
                    };
                });

                showStatus(`✅ Loaded ${parsedCaptions.length} caption lines!`, 'success');
                return parsedCaptions;
                
            } catch (error) {
                showStatus('Could not load subtitles for this video. The video still loads normally.', 'info');
                console.error('Caption fetch error:', error);
                return [];
            }
        }

        async function translateText(text) {
            try {
                // Simple translation using LibreTranslate or similar free API
                // For production, you'd want to use a proper translation API
                const response = await fetch('https://libretranslate.com/translate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        q: text,
                        source: 'de',
                        target: 'en',
                        format: 'text'
                    })
                });
                
                const data = await response.json();
                return data.translatedText;
            } catch (error) {
                return '[Translation unavailable]';
            }
        }

        async function translateCaptions(captionList) {
            const translated = [];
            for (let caption of captionList) {
                const translation = await translateText(caption.german);
                translated.push({
                    ...caption,
                    english: translation
                });
            }
            return translated;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function makeWordsClickable(text, captionIndex) {
            return text.split(/\s+/).map((word, idx) => {
                const cleanWord = word.replace(/[.,!?;:]/g, '');
                const isSaved = savedVocab.some(v => v.word.toLowerCase() === cleanWord.toLowerCase());
                return `<span class="word ${isSaved ? 'saved' : ''}" data-word="${cleanWord}" data-caption="${captionIndex}">${word}</span>`;
            }).join(' ');
        }

        function renderCaptions() {
            if (captions.length === 0) {
                elements.captions.innerHTML = '<div class="loading">No captions loaded yet</div>';
                return;
            }

            const html = captions.map((caption, index) => `
                <div class="caption-line" id="caption-${index}">
                    <div class="timestamp">${formatTime(caption.start)}</div>
                    <div class="caption-german">${makeWordsClickable(caption.german, index)}</div>
                    ${showTranslations && caption.english ? `<div class="caption-english">${caption.english}</div>` : ''}
                </div>
            `).join('');

            elements.captions.innerHTML = html;

            // Add click handlers to words
            document.querySelectorAll('.word').forEach(el => {
                el.addEventListener('click', handleWordClick);
            });
        }

        async function handleWordClick(e) {
            const word = e.target.dataset.word;
            const captionIndex = parseInt(e.target.dataset.caption);
            const caption = captions[captionIndex];

            if (!word || word.length < 2) return;

            // Check if already saved
            if (savedVocab.some(v => v.word.toLowerCase() === word.toLowerCase())) {
                return;
            }

            // Translate the word
            const translation = await translateText(word);
            
            savedVocab.push({
                word,
                translation,
                context: caption.german,
                timestamp: Date.now()
            });

            localStorage.setItem('germanVocab', JSON.stringify(savedVocab));
            renderVocab();
            renderCaptions();
        }

        function renderVocab() {
            if (savedVocab.length === 0) {
                elements.vocabList.innerHTML = '<p style="color: #999; text-align: center;">Click on German words in the transcription to save them here!</p>';
                elements.clearVocab.style.display = 'none';
                return;
            }

            const html = savedVocab.slice().reverse().map(item => `
                <div class="vocab-item">
                    <div class="vocab-word">${item.word}</div>
                    <div class="vocab-translation">${item.translation}</div>
                </div>
            `).join('');

            elements.vocabList.innerHTML = html;
            elements.clearVocab.style.display = 'block';
        }

        elements.loadBtn.addEventListener('click', async () => {
            const url = elements.videoUrl.value.trim();
            if (!url) {
                showStatus('Please enter a YouTube URL', 'error');
                return;
            }

            const videoId = extractVideoId(url);
            if (!videoId) {
                showStatus('Invalid YouTube URL. Please check and try again.', 'error');
                return;
            }

            currentVideoId = videoId;
            currentVideoUrl = url;
            elements.loadBtn.disabled = true;
            elements.loadBtn.textContent = 'Loading...';

            // Load video
            elements.videoFrame.src = `https://www.youtube.com/embed/${videoId}?enablejsapi=1`;
            elements.videoContainer.style.display = 'block';
            elements.controls.style.display = 'flex';
            elements.transcriptionPanel.style.display = 'block';

            const savedForVideo = getSavedSubtitleByVideo(videoId);
            if (savedForVideo) {
                captions = savedForVideo.captions;
                renderCaptions();
                elements.saveSubtitlesBtn.style.display = captions.length > 0 ? 'block' : 'none';
                showStatus('✅ Loaded subtitles from your saved library for this video.', 'success');
                elements.loadBtn.disabled = false;
                elements.loadBtn.textContent = 'Load Video';
                return;
            }

            // Fetch and translate captions
            captions = await fetchCaptions(videoId);
            
            if (captions.length > 0) {
                elements.captions.innerHTML = '<div class="loading"><div class="spinner"></div>Translating captions...</div>';
                captions = await translateCaptions(captions);
                renderCaptions();
                elements.saveSubtitlesBtn.style.display = 'block';
            } else {
                renderNoCaptionsState('Try another video that has German subtitles enabled.');
                elements.saveSubtitlesBtn.style.display = 'none';
            }

            elements.loadBtn.disabled = false;
            elements.loadBtn.textContent = 'Load Video';
        });

        elements.clearVocab.addEventListener('click', () => {
            if (confirm('Clear all saved vocabulary?')) {
                savedVocab = [];
                localStorage.removeItem('germanVocab');
                renderVocab();
                renderCaptions();
            }
        });

        elements.saveSubtitlesBtn.addEventListener('click', saveCurrentSubtitles);

        elements.autoScrollBtn.addEventListener('click', () => {
            autoScroll = !autoScroll;
            elements.autoScrollBtn.textContent = `Auto-scroll: ${autoScroll ? 'ON' : 'OFF'}`;
            elements.autoScrollBtn.classList.toggle('active', autoScroll);
        });

        elements.showTranslationBtn.addEventListener('click', () => {
            showTranslations = !showTranslations;
            elements.showTranslationBtn.textContent = `Translations: ${showTranslations ? 'ON' : 'OFF'}`;
            elements.showTranslationBtn.classList.toggle('active', showTranslations);
            renderCaptions();
        });

        // Initial render
        renderVocab();
        renderSavedSubtitles();
    </script>
</body>
</html>
